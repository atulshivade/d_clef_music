# Netlify configuration for Shred Sound Music — Performance & Challenge Portal
#
# Per Netlify's current Next.js guidance (2026), the OpenNext adapter is
# applied automatically — DO NOT pin @netlify/plugin-nextjs in package.json
# or list it as a `[[plugins]]` here. Doing so opts you out of automatic
# updates.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  # Auth.js needs this when running behind Netlify's reverse proxy so it
  # trusts the Host header from the request.
  AUTH_TRUST_HOST = "true"
  # Skip Husky / git hooks during CI install
  HUSKY = "0"
  # Marker the app code uses to switch storage to "graceful-disabled" mode
  # when no remote video provider is configured. Set VIDEO_PROVIDER (and
  # the matching CLOUDINARY_URL / BUNNY_* / VIMEO_* vars) in Netlify's
  # site environment settings to re-enable direct file uploads — the
  # capability gate is video-provider-aware and will lift the block as
  # soon as a remote provider is wired up.
  IS_NETLIFY = "true"

# Sensible default headers — tighten as needed.
[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
